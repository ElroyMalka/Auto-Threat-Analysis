<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מייצר מסמך וורד</title>
    <script src="https://unpkg.com/docx@8.2.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background-color: #2b5797; color: white; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <button onclick="generateWord()">צור מסמך וורד והורד לאייפד</button>

    <script>
        function generateWord() {
            const { Document, Packer, Paragraph, TextRun } = docx;

            // יצירת המסמך
            const doc = new Document({
                sections: [{
                    children: [
                        new Paragraph({
                            children: [
                                new TextRun({
                                    text: "שלום",
                                    bold: true,
                                    size: 48,
                                }),
                            ],
                        }),
                    ],
                }],
            });

            // יצירת הבלוב (Blob) והורדה
            Packer.toBlob(doc).then((blob) => {
                saveAs(blob, "hello_world.docx");
            });
        }
    </script>
</body>
</html>
