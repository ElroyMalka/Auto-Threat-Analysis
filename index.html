<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מייצר DOCX אמיתי</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #2b5797; }
        .btn { padding: 20px 40px; background: white; color: #2b5797; border-radius: 12px; border: none; font-weight: bold; font-size: 1.3rem; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <button onclick="createDocx()" class="btn">הורד קובץ .docx אמיתי</button>

    <script>
        function createDocx() {
            const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;

            // יצירת מבנה המסמך
            const doc = new Document({
                sections: [{
                    properties: {},
                    children: [
                        new Paragraph({
                            alignment: AlignmentType.CENTER,
                            children: [
                                new TextRun({
                                    text: "שלום",
                                    bold: true,
                                    size: 72, // גודל 36 בנקודות וורד
                                    font: "Arial"
                                }),
                            ],
                        }),
                        new Paragraph({
                            alignment: AlignmentType.CENTER,
                            children: [
                                new TextRun({
                                    text: "זהו קובץ docx תקין שנוצר ב-JavaScript",
                                    size: 28,
                                    font: "Arial"
                                }),
                            ],
                        }),
                    ],
                }],
            });

            // יצירת הקובץ והורדה
            Packer.toBlob(doc).then(blob => {
                saveAs(blob, "hello_world.docx");
            });
        }
    </script>
</body>
</html>
