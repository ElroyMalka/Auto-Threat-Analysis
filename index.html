<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Generator</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f0f5; }
        button { padding: 20px 40px; font-size: 1.5rem; cursor: pointer; background-color: #007AFF; color: white; border: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <button onclick="downloadDoc()">הורד מסמך "שלום" לאייפד</button>

    <script>
        function downloadDoc() {
            // התוכן של המסמך בפורמט HTML שוורד מבין
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' "+
                           "xmlns:w='urn:schemas-microsoft-com:office:word' "+
                           "xmlns='http://www.w3.org/TR/REC-html40' dir='rtl'>"+
                           "<head><meta charset='utf-8'></head><body>";
            const footer = "</body></html>";
            const content = "<h1>שלום</h1><p>זהו מסמך שנוצר מהאייפד!</p>";
            
            const sourceHTML = header + content + footer;
            
            // יצירת קישור להורדה
            const blob = new Blob(['\ufeff', sourceHTML], {
                type: 'application/msword'
            });
            
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            link.href = url;
            link.download = "hello.doc"; // סיומת .doc עובדת טוב יותר בשיטה זו
            
            // הוספה למסמך, לחיצה והסרה (נדרש בחלק מהדפדפנים)
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
