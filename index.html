<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Fix for iPad</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f0f0f7; 
        }
        .btn { 
            padding: 20px 40px; 
            font-size: 1.2rem; 
            background-color: #2b5797; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <a id="downloadLink" class="btn" href="#">הורד מסמך וורד (שלום)</a>

    <script>
        window.onload = function() {
            // תוכן בפורמט RTF שתומך בעברית (קידוד ANSI)
            // \u1513\u1dc\u1dc\u1dd - זה הייצוג של "שלום" ב-RTF
            const rtfContent = "{\\rtf1\\ansi\\deff0 {\\fonttbl {\\f0 Times New Roman;}}\n" +
                               "{\\f0\\fs40 \\rtlch \\u1513?\\u1dc?\\u1dc?\\u1dd?}\n}";

            const blob = new Blob([rtfContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            
            const link = document.getElementById('downloadLink');
            link.href = url;
            link.download = "shalom.doc";
        };
    </script>
</body>
</html>
